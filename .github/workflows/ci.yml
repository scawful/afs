name: AFS CI/CD Pipeline

on:
  push:
    branches: [ main, development, features ]
  pull_request:
    branches: [ main, development, features ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[test]
        pip install pytest pytest-cov pytest-xdist pytest-timeout ruff 'mypy<2'

    - name: Lint with ruff
      run: ruff check src/ tests/

    - name: Type check with mypy (advisory)
      continue-on-error: true
      run: mypy src/afs --ignore-missing-imports

    - name: Run unit tests
      run: |
        pytest tests/ -v \
          -m "not slow and not integration and not requires_gpu" \
          --cov=src/afs \
          --cov-report=xml \
          --cov-report=term \
          --timeout=30 \
          -n auto

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[test]

    - name: Run integration tests
      run: |
        set +e
        pytest tests/ -v \
          -m "integration and not requires_gpu" \
          --timeout=300
        status=$?
        set -e
        if [ "$status" -eq 5 ]; then
          echo "No integration tests selected; treating as skipped."
          exit 0
        fi
        exit "$status"

  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[docs]

    - name: Build docs
      run: mkdocs build --strict

    - name: Upload docs artifact
      uses: actions/upload-artifact@v4
      with:
        name: documentation
        path: site/

  vscode-extension-guard:
    name: VSCode Extension Guard
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Validate extension scripts
      run: |
        if [ ! -f extensions/vscode-afs/package.json ]; then
          echo "No extensions/vscode-afs package yet; skipping guard."
          exit 0
        fi
        node -e "const pkg=require('./extensions/vscode-afs/package.json'); const required=['lint','test']; const missing=required.filter((name)=>!pkg.scripts||!pkg.scripts[name]); if(missing.length){console.error('Missing required npm scripts: '+missing.join(', ')); process.exit(1)}"

    - name: Run extension lint and tests
      run: |
        if [ ! -f extensions/vscode-afs/package.json ]; then
          echo "No extensions/vscode-afs package yet; skipping guard."
          exit 0
        fi
        cd extensions/vscode-afs
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install --no-audit --no-fund
        fi
        npm run lint
        npm run typecheck --if-present
        npm run test

  package:
    name: Build Package
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Build distributions
      run: |
        python -m pip install --upgrade pip build
        python -m build
        python scripts/check_release.py --dist

    - name: Install wheel smoke test
      run: |
        python -m venv /tmp/afs-wheel-smoke
        /tmp/afs-wheel-smoke/bin/pip install dist/*.whl
        /tmp/afs-wheel-smoke/bin/python -c "import afs; print(afs.__version__)"
        /tmp/afs-wheel-smoke/bin/afs --help >/tmp/afs-help.txt

    - name: Upload package artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-package
        path: dist/

  main-release-smoke:
    name: Main Release Smoke
    runs-on: ubuntu-latest
    needs: [test, integration-tests, build-docs, vscode-extension-guard, package]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Verify release metadata
      run: |
        python scripts/check_release.py
        grep -q "## \[0.2.0\]" CHANGELOG.md
        grep -q "MIT License" LICENSE
        echo "AFS main release smoke passed."
