site_name: AFS Core Documentation
site_url: https://scawful.github.io/afs/
repo_url: https://github.com/scawful/afs
edit_uri: edit/main/docs/
exclude_docs: README.md

theme:
  name: material
  palette:
    - scheme: default
      primary: blue grey
      accent: teal
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
    - search.highlight

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tasklist
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Executive Summary: EXECUTIVE_SUMMARY.md
  - Guides:
    - Agent Surfaces: AGENT_SURFACES.md
    - Architecture: ARCHITECTURE.md
    - Profiles and Hooks: PROFILES.md
    - Extensions: PLUGINS.md
    - Extension Authoring: EXTENSION_AUTHORING.md
    - MCP Server: MCP_SERVER.md
    - Memory System: MEMORY_SYSTEM.md
    - Workspace Integration: WORKSPACE_INTEGRATION.md
  - Operations:
    - Health Quick Start: HEALTH_QUICK_START.md
  - Reference:
    - CLI Reference: CLI_REFERENCE.md
    - API: api.md
  - Migration:
    - Extension Migration: EXTENSION_MIGRATION.md
  - Research:
    - Lineage: LINEAGE.md

extra:
  version: "0.2.0"
