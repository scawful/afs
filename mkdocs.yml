site_name: AFS Core Documentation
site_url: https://afs.local
repo_url: https://github.com/scawful/afs
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: blue grey
      accent: teal
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
    - search.highlight

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tasklist
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Guides:
    - Architecture: ARCHITECTURE.md
    - Profiles and Hooks: PROFILES.md
    - Extensions: PLUGINS.md
    - MCP Server: MCP_SERVER.md
    - Memory System: MEMORY_SYSTEM.md
    - Workspace Integration: WORKSPACE_INTEGRATION.md
  - Operations:
    - Health Quick Start: HEALTH_QUICK_START.md
  - Reference:
    - CLI Reference: CLI_REFERENCE.md
    - API: api.md
  - Migration:
    - AFS Scawful Migration: SCAWFUL_MIGRATION.md

extra:
  version: "core"
