name: AFS CI/CD Pipeline

on:
  push:
    branches: [ main, development, features ]
  pull_request:
    branches: [ main, development, features ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
    - uses: actions/checkout@v7.0.0

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6.3.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache dependencies
      uses: actions/cache@v6.1.0
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test]"
        pip install pytest pytest-cov pytest-xdist pytest-timeout 'ruff==0.15.*' 'mypy==1.11.*'

    - name: Lint with ruff
      run: ruff check src/ tests/

    - name: Type check (whole package, ratcheted baseline)
      run: make type-check

    - name: Run unit tests
      run: |
        pytest tests/ -v \
          -m "not slow and not integration and not requires_gpu" \
          --cov=src/afs \
          --cov-report=xml \
          --cov-report=term \
          --timeout=30 \
          -n auto

    - name: Upload coverage to Codecov
      if: ${{ env.CODECOV_TOKEN != '' }}
      uses: codecov/codecov-action@v7.0.0
      with:
        files: ./coverage.xml
        token: ${{ env.CODECOV_TOKEN }}
        fail_ci_if_error: false

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v7.0.0

    - name: Set up Python
      uses: actions/setup-python@v6.3.0
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test]"

    - name: Run integration tests
      run: |
        set +e
        pytest tests/ -v \
          -m "integration and not requires_gpu" \
          --timeout=300
        status=$?
        set -e
        if [ "$status" -eq 5 ]; then
          echo "No integration tests selected; treating as skipped."
          exit 0
        fi
        exit "$status"

  execution-contract:
    name: Execution Contract (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v7.0.0

    - name: Set up Python
      uses: actions/setup-python@v6.3.0
      with:
        python-version: '3.12'

    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e ".[test]"

    - name: Run execution contract tests
      run: >-
        python -m pytest -q
        tests/test_execution_protocols.py
        tests/test_execution_broker.py
        tests/test_cli_execution.py
        tests/test_config.py
        tests/test_cli_verify.py
        tests/test_session_harness.py
        tests/test_model_prompts.py
        tests/test_optimization_decision.py
        tests/test_guardrails.py

  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7.0.0

    - name: Set up Python
      uses: actions/setup-python@v6.3.0
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[docs]"

    - name: Build docs
      run: mkdocs build --strict

    - name: Upload docs artifact
      uses: actions/upload-artifact@v7.0.1
      with:
        name: documentation
        path: site/

  vscode-extension-guard:
    name: VSCode Extension Guard
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7.0.0

    - name: Set up Node.js
      uses: actions/setup-node@v6.4.0
      with:
        node-version: '20'

    - name: Validate extension scripts
      run: |
        if [ ! -f extensions/vscode-afs/package.json ]; then
          echo "No extensions/vscode-afs package yet; skipping guard."
          exit 0
        fi
        node -e "const pkg=require('./extensions/vscode-afs/package.json'); const required=['lint','test']; const missing=required.filter((name)=>!pkg.scripts||!pkg.scripts[name]); if(missing.length){console.error('Missing required npm scripts: '+missing.join(', ')); process.exit(1)}"

    - name: Run extension lint and tests
      run: |
        if [ ! -f extensions/vscode-afs/package.json ]; then
          echo "No extensions/vscode-afs package yet; skipping guard."
          exit 0
        fi
        cd extensions/vscode-afs
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install --no-audit --no-fund
        fi
        npm run lint
        npm run typecheck --if-present
        npm run test

  package:
    name: Build Package
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7.0.0

    - name: Set up Python
      uses: actions/setup-python@v6.3.0
      with:
        python-version: '3.11'

    - name: Build distributions
      run: |
        python -m pip install --upgrade pip build
        python -m build
        python scripts/check_release.py --dist

    - name: Install wheel smoke test
      run: |
        python -m venv /tmp/afs-wheel-smoke
        /tmp/afs-wheel-smoke/bin/pip install dist/*.whl
        /tmp/afs-wheel-smoke/bin/python -c "import afs; print(afs.__version__)"
        /tmp/afs-wheel-smoke/bin/afs --help >/tmp/afs-help.txt
        smoke_dir="$(mktemp -d)"
        export AFS_WHEEL_SMOKE_DIR="$smoke_dir"

        /tmp/afs-wheel-smoke/bin/python <<'PY'
        import json
        import os
        from pathlib import Path

        from afs.execution import (
            ArgvCommand,
            ExecutionPolicy,
            ExecutionRequest,
            execute_checked,
        )

        output = Path(os.environ["AFS_WHEEL_SMOKE_DIR"])
        root = Path.cwd().resolve()
        executable = Path("/bin/echo").resolve()
        request = ExecutionRequest(
            command=ArgvCommand((str(executable), "wheel-smoke")),
            caller="release-smoke",
            purpose="validate installed execution protocol artifacts",
            cwd=root,
        )
        policy = ExecutionPolicy(
            allowed_cwd_roots=(root,),
            allowed_executables=frozenset({str(executable)}),
        )
        record = execute_checked(request, policy)
        if record.outcome != "completed":
            raise SystemExit(f"installed-wheel execution smoke failed: {record.outcome}")
        (output / "execution-request.json").write_text(
            json.dumps(request.to_dict(), indent=2), encoding="utf-8"
        )
        (output / "execution-record.json").write_text(
            json.dumps(record.to_dict(), indent=2), encoding="utf-8"
        )
        PY

        /tmp/afs-wheel-smoke/bin/afs execution inspect \
          --request "$smoke_dir/execution-request.json" \
          --allowed-root "$PWD" \
          --allowed-executable /bin/echo \
          --json >"$smoke_dir/execution-inspection.json"

        schemas=(
          v1/execution/request
          v1/execution/inspection
          v1/execution/record
          v1/optimization/evaluation
          v1/optimization/policy
          v1/optimization/decision
        )
        for schema in "${schemas[@]}"; do
          /tmp/afs-wheel-smoke/bin/afs schema show "$schema" \
            >"$smoke_dir/${schema//\//_}.schema.json"
        done

        /tmp/afs-wheel-smoke/bin/afs schema validate \
          --schema v1/execution/request \
          --file "$smoke_dir/execution-request.json"
        /tmp/afs-wheel-smoke/bin/afs schema validate \
          --schema v1/execution/inspection \
          --file "$smoke_dir/execution-inspection.json"
        /tmp/afs-wheel-smoke/bin/afs schema validate \
          --schema v1/execution/record \
          --file "$smoke_dir/execution-record.json"
        /tmp/afs-wheel-smoke/bin/afs schema validate \
          --schema v1/optimization/evaluation \
          --file examples/optimization_gate/baseline.json
        /tmp/afs-wheel-smoke/bin/afs schema validate \
          --schema v1/optimization/evaluation \
          --file examples/optimization_gate/candidate.json
        /tmp/afs-wheel-smoke/bin/afs schema validate \
          --schema v1/optimization/policy \
          --file examples/optimization_gate/policy.json
        /tmp/afs-wheel-smoke/bin/afs optimize decide \
          --baseline examples/optimization_gate/baseline.json \
          --candidate examples/optimization_gate/candidate.json \
          --policy examples/optimization_gate/policy.json \
          --json >"$smoke_dir/optimization-decision.json"
        /tmp/afs-wheel-smoke/bin/afs schema validate \
          --schema v1/optimization/decision \
          --file "$smoke_dir/optimization-decision.json"

    - name: Upload package artifacts
      uses: actions/upload-artifact@v7.0.1
      with:
        name: python-package
        path: dist/

  main-release-smoke:
    name: Main Release Smoke
    runs-on: ubuntu-latest
    needs: [test, integration-tests, execution-contract, build-docs, vscode-extension-guard, package]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v7.0.0

    - name: Verify release metadata
      run: |
        python scripts/check_release.py
        grep -q "## \[0.2.0\]" CHANGELOG.md
        grep -q "MIT License" LICENSE
        echo "AFS main release smoke passed."
