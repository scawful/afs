name: AFS CI/CD Pipeline

on:
  push:
    branches: [ main, development, features ]
  pull_request:
    branches: [ main, development, features ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[test]
        pip install pytest pytest-cov pytest-xdist pytest-timeout

    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check src/ tests/

    - name: Type check with mypy (advisory)
      continue-on-error: true
      run: |
        pip install mypy
        mypy src/afs --ignore-missing-imports

    - name: Run unit tests
      run: |
        pytest tests/ -v \
          -m "not slow and not integration and not requires_gpu" \
          --cov=src/afs \
          --cov-report=xml \
          --cov-report=term \
          --timeout=30 \
          -n auto

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -e .[test]

    - name: Run integration tests
      run: |
        set +e
        pytest tests/ -v \
          -m "integration and not requires_gpu" \
          --timeout=300
        status=$?
        set -e
        if [ "$status" -eq 5 ]; then
          echo "No integration tests selected; treating as skipped."
          exit 0
        fi
        exit "$status"

  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -e .[docs]
        pip install sphinx sphinx-rtd-theme

    - name: Build docs
      run: |
        cd docs
        if [ -f Makefile ]; then
          make html
        else
          echo "No docs/Makefile found; creating lightweight docs artifact."
          mkdir -p _build/html
          cp index.md _build/html/index.md
        fi

    - name: Upload docs artifact
      uses: actions/upload-artifact@v4
      with:
        name: documentation
        path: docs/_build/html/

  vscode-extension-guard:
    name: VSCode Extension Guard
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Validate extension scripts
      run: |
        if [ ! -f extensions/vscode-afs/package.json ]; then
          echo "No extensions/vscode-afs package yet; skipping guard."
          exit 0
        fi
        node -e "const pkg=require('./extensions/vscode-afs/package.json'); const required=['lint','test']; const missing=required.filter((name)=>!pkg.scripts||!pkg.scripts[name]); if(missing.length){console.error('Missing required npm scripts: '+missing.join(', ')); process.exit(1)}"

    - name: Run extension lint and tests
      run: |
        if [ ! -f extensions/vscode-afs/package.json ]; then
          echo "No extensions/vscode-afs package yet; skipping guard."
          exit 0
        fi
        cd extensions/vscode-afs
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install --no-audit --no-fund
        fi
        npm run lint
        npm run typecheck --if-present
        npm run test

  model-eval:
    name: Model Evaluation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -e .

    - name: Download latest models
      run: |
        # Download models from artifacts or cloud storage
        echo "Model download would happen here"

    - name: Run evaluations
      run: |
        # Run eval suite on models
        python3 scripts/run_eval.py \
          --model models/majora-v1-Q8_0.gguf \
          --eval evaluations/majora_v1_oracle_eval.jsonl \
          --output evaluations/results/ci_results.json \
          || echo "No model available for evaluation"

    - name: Upload eval results
      uses: actions/upload-artifact@v4
      with:
        name: evaluation-results
        path: evaluations/results/

  deploy:
    name: Deploy Models
    runs-on: ubuntu-latest
    needs: [test, integration-tests, model-eval]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Deploy model artifact backup
      run: |
        if [ ! -f scripts/gdrive_backup.py ]; then
          echo "No external artifact backup script found; skipping deploy."
          exit 0
        fi
        if [ -z "${GCP_CREDENTIALS_JSON:-}" ]; then
          echo "No GCP credentials configured; skipping deploy."
          exit 0
        fi
        credentials_file="$RUNNER_TEMP/gcp_credentials.json"
        printf '%s' "$GCP_CREDENTIALS_JSON" > "$credentials_file"
        export GOOGLE_APPLICATION_CREDENTIALS="$credentials_file"
        python3 scripts/gdrive_backup.py --all
      env:
        GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS }}

    - name: Notify on success
      if: always()
      run: |
        if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
          echo "No Slack webhook configured; skipping notification."
          exit 0
        fi
        curl -fsS -X POST \
          -H 'Content-Type: application/json' \
          --data '{"text":"AFS CI/CD completed on main."}' \
          "$SLACK_WEBHOOK_URL"
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
